[env]
TERM = "xterm-256color"

# Font Configuration
[font]
size = 13

[font.normal]
family = "JetBrainsMono Nerd Font"

[font.offset]
x = 0
y = 5

[font.glyph_offset]
x = 0
y = 0

# Scrolling
[scrolling]
history = 10000
multiplier = 3

# Selection
[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

# Window
[window]
decorations_theme_variant = "none"
padding = { x = 0, y = 0 }
dimensions = { columns = 210, lines = 50 }
dynamic_padding = true
startup_mode = "Windowed"
title = "Hell's Terminal"
dynamic_title = false
opacity = 1
blur = false

# Keyboard
[keyboard]
bindings = [
  { key = "Enter", mods = "Command", action = "ToggleFullscreen" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]

# Cursor
[cursor]
blink_interval = 0
unfocused_hollow = true

[cursor.style]
shape = "Block"
blinking = "Never"

# General
[general]
live_config_reload = true
working_directory = "None"

import = [
  "~/.dotfiles/terminals/alacritty/theme.toml",
]

