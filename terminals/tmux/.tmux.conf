# ==========================
# ===  General settings  ===
# ==========================
set -g prefix C-a

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g detach-on-destroy off  # don't exit from tmux when closing a session 
set -g escape-time 0          # zero-out escape time delay
set -g mouse on               # enable mouse support
set -g set-clipboard on       # use system clipboard
set -g status-interval 2      # update status every 2 seconds

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# -- navigation ----------------------------------------------------------------
 
# switch session
# List tmux windows from all sessions and switch to the selected one
bind s display-popup -E "tmux list-windows -a -F '#S:#I:#W' | fzf --height 40% --reverse --border --ansi --preview 'tmux capture-pane -ept \$(echo {} | cut -d: -f1,2)' | cut -d: -f1,2 | xargs tmux switch-client -t"

# Scripting With FZF
bind a display-popup -E 'app' # Open Mac App

bind -r \\ switch-client -l

# create session
bind C-c new-session

# split current window horizontally
bind-key - split-window -v -c "#{pane_current_path}" -l 30%

# split current window vertically
bind-key | split-window -h -c "#{pane_current_path}" -l 50%

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right

# pane resizing
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 2

# pane swapping (directional, falls back to prev/next pane when no directional neighbor)
bind -r Left if -F '#{pane_at_left}'   'swap-pane -U' 'swap-pane -s "{left-of}"'
bind -r Down if -F '#{pane_at_bottom}' 'swap-pane -D' 'swap-pane -s "{down-of}"'
bind -r Up if -F '#{pane_at_top}'    'swap-pane -U' 'swap-pane -s "{up-of}"'
bind -r Right if -F '#{pane_at_right}'  'swap-pane -D' 'swap-pane -s "{right-of}"'

# Reset Key Bindings
bind -n C-l send-keys "C-l"

#/Vi mode
bind v copy-mode
# Use v to trigger selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Use y to yank current selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'

# window navigation
unbind n
unbind p
unbind C-h
unbind C-l
bind -r C-h previous-window # select previous window
bind -r C-l next-window     # select next window
bind -r Tab last-window        # move to last active window

# reload the tmux config
bind r source-file ~/.tmux.conf \; display "Configuration Reloaded"

# toggle theme manually (auto theme changes via background daemon)
bind T run-shell "~/.dotfiles/terminals/tmux/scripts/switch-theme.sh"

# Temporary window
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"
bind-key R new-window -n serpl -c "#{pane_current_path}" "serpl"
bind-key / new-window -n superfile -c "#{pane_current_path}" "spf"
bind-key i new-window -n lazydocker -c "#{pane_current_path}" "lazydocker"

# ============================
# ===       Plugins        ===
# ============================
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-logging'
set -g @logging-path "/tmp"
set -g @screen-capture-path "/tmp"
set -g @screen-capture-key 'p'

set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-command 'echo -n {} | pbcopy'

set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-sensible'


