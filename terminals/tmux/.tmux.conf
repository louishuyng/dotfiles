# ==========================
# ===   Styling          ===
# ==========================

# Status bar layout (theme-independent settings)
set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify left

# Pane border settings
set -g pane-border-lines "heavy"
set -g pane-border-status off

# Clock mode
setw -g clock-mode-style 24

# Load theme based on macOS appearance (auto-detect on startup)
# The background daemon will handle live switching
if-shell 'defaults read -g AppleInterfaceStyle &>/dev/null' \
    'source-file ~/.dotfiles/terminals/tmux/plugins/dark.conf' \
    'source-file ~/.dotfiles/terminals/tmux/plugins/light.conf'

# Activity monitoring with better visual feedback
set -g monitor-activity on
set -g visual-activity off

# Auto rename window to current folder name
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Re-enable automatic rename for windows created by tmuxinator (which sets names explicitly)
set-hook -g after-new-window 'set-option -w automatic-rename on'
set-hook -g after-new-session 'set-option -w automatic-rename on'


run '~/.tmux/plugins/tpm/tpm'
