format = """\
В»\
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
(\
    via \
    $python\
    $golang\
    $nodejs\
    $c\
    $rust\
    $terraform\
    $java\
    $character\
)\
"""

right_format = """\
$cmd_duration\
$docker_context\
$kubernetes\
$time \
"""

palette = "catppuccin_latte"

# Add the modules you need

# Disable the blank line at the start of the prompt
add_newline = true


# I disabled some modules (Rust, Java...) since some things aren't installed in my machine, enable them if you need.

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "о°ӣ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "
"Others" = "пҮҗ "

[username]
disabled = true
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = " $user "

[line_break] 
disabled = true


[os]
disabled = true

[os.symbols]
Alpine = "пҢҖ "
Arch = "пҢғ "
Debian = "пҢҶ "
EndeavourOS = "пҶ— "
Fedora = "пҢҠ "
Linux = "пҢҡ "
Manjaro = "пҢ’ "
Mint = "пҢҺ "
NixOS = "пҶ— "
Macos = "пҢ“ "
openSUSE = "пҢ” "
Pop = "оҠЈ "
SUSE = "пҢ” "
Ubuntu = "пҢӣ "
Windows = "п…ә "

[character] 
disabled = false
success_symbol = "[оһҘ ](bold fg:green)"
error_symbol = "[вңҳ ](bold fg:red)"
vimcmd_symbol = "[: ](bold fg:yellow)"

[cmd_duration]
disabled = false
format = "took [п“Ј $duration]($style) "
min_time = 500


[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="пӮӣ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="пҠ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="п…ұ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="оңӮ "
else
    GIT_REMOTE_SYMBOL="оңӮ "
fi
echo "$GIT_REMOTE_SYMBOL  "
"""
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--norc", "--noprofile"]
format = "$output "
require_repo = true

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = '''
common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
[ "$common_dir" != "$git_dir" ] && echo "вӣ“ "
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--norc", "--noprofile"]
format = " ([$output ]($style))"
style = "bold green"
require_repo = true

[git_branch]
symbol = "(base)пҗҳ "
style = "fg:lavender bg:base"
format =  " [$symbol$branch]($style)(base) "


# [git_status] 
# MINIMAL git status 
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "вҮЎ${count} "
# behind   = "вҮЈ${count} "
# diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} "

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[В»${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[вүЎ${count} ](lavender)"
conflicted = "[вң–${count} ](red bold)"

ahead      = "[вҮЎ${count} ](teal)"
behind     = "[вҮЈ${count} ](peach)"
diverged   = "[вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} ](mauve)"


[docker_context]
disabled=false
symbol = "пҢҲ "

[kubernetes]
disabled=false
symbol = "о қ "
format = "[$symbol$context]($style) "

[time]
disabled = true
time_format = "%R"
format = "[[ пҗә $time ](fg:yellow bg:foam)]($style)"

[package]
disabled=true

[fill]
symbol = " "

[nodejs]
format = "[$symbol$version ]($style)"
symbol = "оңҳ "
version_format = "${raw}"
disabled=false

[python]
disabled=false
format = '[${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = "оҳҶ "
version_format = "${raw}"

[java]
format = "[$symbol$version ]($style)"
version_format = "${raw}"
symbol = "оҷӯ "
disabled = true

[c]
format = "[$symbol($version(-$name)) ]($style)"
symbol = "оҳһ "
version_format = "${raw}"
disabled=true

[golang]
symbol = "оҳ§"
format = '[$symbol( $version) ]($style)'

[rust]
format ="[$symbol$version ]($style)"
symbol = "оҡӢ "
version_format = "${raw}"

[terraform]
format = "[$symbol($version) ]($style)"
symbol = "рҹҸҺ "
version_format = "${raw}"
disabled=false

