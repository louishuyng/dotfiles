# I disabled some modules (Rust, Java...) since some things aren't installed in my machine, enable them if you need.

[directory]
style = "sapphire"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "о∞Ы "
"Pictures" = "пАЊ "
"Developer" = "у∞≤Л "
"Others" = "пЗР "

[username]
disabled = true
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = " $user "

[line_break] 
disabled = true


[os]
disabled = true

[os.symbols]
Alpine = "пМА "
Arch = "пМГ "
Debian = "пМЖ "
EndeavourOS = "пЖЧ "
Fedora = "пМК "
Linux = "пМЪ "
Manjaro = "пМТ "
Mint = "пМО "
NixOS = "пЖЧ "
Macos = "пМУ "
openSUSE = "пМФ "
Pop = "оК£ "
SUSE = "пМФ "
Ubuntu = "пМЫ "
Windows = "пЕЇ "

[character] 
disabled = false
success_symbol = "[оЮ• ](bold fg:green)"
error_symbol = "[вЬШ ](bold fg:red)"
vimcmd_symbol = "[: ](bold fg:yellow)"

[cmd_duration]
disabled = false
format = "took [пУ£ $duration]($style) "
min_time = 500


[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="пВЫ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="пКЦ "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="пЕ± "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="оЬВ "
else
    GIT_REMOTE_SYMBOL="оЬВ "
fi
echo "$GIT_REMOTE_SYMBOL  "
"""
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--norc", "--noprofile"]
format = "$output "
require_repo = true

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = '''
common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
[ "$common_dir" != "$git_dir" ] && echo "вЫУ "
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "--norc", "--noprofile"]
format = " ([$output ]($style))"
style = "bold green"
require_repo = true

[git_branch]
symbol = "(base)пРШ "
style = "fg:lavender bg:base"
format =  " [$symbol$branch]($style)(base) "


# [git_status] 
# MINIMAL git status 
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "вЗ°${count} "
# behind   = "вЗ£${count} "
# diverged = "вЗХвЗ°${ahead_count}вЗ£${behind_count} "

[git_status]
format = "[$staged$modified$renamed$conflicted$ahead_behind]($style)"
# options available for format
staged     = "[+${count} ](green)"
modified   = "[!${count} ](yellow)"
renamed    = "[¬ї${count} ](blue)"
deleted    = "[-${count} ](red)"
untracked  = "[?${count} ](sapphire)"
stashed    = "[вЙ°${count} ](lavender)"
conflicted = "[вЬЦ${count} ](red bold)"

ahead      = "[вЗ°${count} ](teal)"
behind     = "[вЗ£${count} ](peach)"
diverged   = "[вЗХвЗ°${ahead_count}вЗ£${behind_count} ](mauve)"


[docker_context]
disabled=false
symbol = "пМИ "

[kubernetes]
disabled=false
symbol = "о†Э "
format = "[$symbol$context]($style) "

[time]
disabled = true
time_format = "%R"
format = "[[ пРЇ $time ](fg:yellow bg:foam)]($style)"

[package]
disabled=true

[fill]
symbol = " "

[nodejs]
